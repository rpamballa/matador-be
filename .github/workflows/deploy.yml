name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy-staging:
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      - uses: gradle/actions/setup-gradle@v4

      - name: Build container image
        run: ./gradlew --no-daemon bootBuildImage --imageName=ghcr.io/${{ github.repository }}:${{ github.sha }}

      # Placeholder: push to registry + deploy to staging are environment-specific.
      # See docs/BACKEND.md §10. Production promotion is manual.
      - name: Notice
        run: echo "Wire registry push + staging deploy + openapi publish here."
