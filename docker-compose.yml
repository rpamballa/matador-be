services:
  postgres:
    image: postgis/postgis:16-3.4
    container_name: matador-postgres
    environment:
      POSTGRES_DB: matador
      POSTGRES_USER: matador
      POSTGRES_PASSWORD: matador
    ports:
      - "5432:5432"
    volumes:
      - matador-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U matador -d matador"]
      interval: 5s
      timeout: 5s
      retries: 10

  mailpit:
    image: axllent/mailpit:latest
    container_name: matador-mailpit
    ports:
      - "1025:1025"   # SMTP
      - "8025:8025"   # Web UI
    environment:
      MP_MAX_MESSAGES: 500

  backend:
    build: .
    container_name: matador-backend
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: dev
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/matador
      SPRING_DATASOURCE_USERNAME: matador
      SPRING_DATASOURCE_PASSWORD: matador
      SPRING_MAIL_HOST: mailpit
      SPRING_MAIL_PORT: 1025
    profiles:
      - full

volumes:
  matador-pgdata:
